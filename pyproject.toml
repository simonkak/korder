[project]
name = "korder"
version = "0.1.0"
description = "Voice-to-text dock for KDE Plasma (Wayland-first)"
requires-python = ">=3.11"
dependencies = [
    "PySide6>=6.7",
    "sounddevice>=0.4.6",
    "numpy>=1.26",
    "pywhispercpp>=1.3",
]

[project.scripts]
korder = "korder.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/korder"]
